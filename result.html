<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - BrainMatch</title>

    <!-- Simple Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- My CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Simple Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="memory-game.html">BrainMatch</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="memory-game.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="setup.html">Play</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Space under navbar -->
    <div style="height: 70px;"></div>

    <!-- Results Section -->
    <div class="container my-4">
        <div class="card p-4 text-center">

            <h2 class="mb-3">Game Completed!</h2>
            <p class="text-muted">Here are your results:</p>

            <div class="row my-4">

                <div class="col-md-4 mb-3">
                    <h3 id="resultTime">00:00</h3>
                    <small class="text-muted">Time</small>
                </div>

                <div class="col-md-4 mb-3">
                    <h3 id="resultMoves">0</h3>
                    <small class="text-muted">Moves</small>
                </div>

                <div class="col-md-4 mb-3">
                    <h3 id="resultScore">0</h3>
                    <small class="text-muted">Score</small>
                </div>

            </div>

            <div class="my-3" id="rating">
                ⭐ ⭐ ⭐
            </div>

            <div class="mt-4">
                <a href="setup.html" class="btn btn-primary me-2">Play Again</a>
                <a href="memory-game.html" class="btn btn-secondary">Home</a>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3">
        <p class="mb-0">BrainMatch | Memory Game | SEG3125</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Get results from URL parameters
        const urlParams = new URLSearchParams(window.location.search);

        document.getElementById('resultTime').textContent =
            urlParams.get('time') || '00:00';

        document.getElementById('resultMoves').textContent =
            urlParams.get('moves') || '0';

        document.getElementById('resultScore').textContent =
            urlParams.get('score') || '0';
    </script>

</body>
</html>
