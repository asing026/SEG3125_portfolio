<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - BrainMatch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="memory-game.html">BrainMatch</a>
        </div>
    </nav>

    <div style="height: 70px;"></div>

    <!-- Stats -->
    <div class="container mb-3">
        <div class="card p-3">
            <div class="row text-center">
                <div class="col">
                    <p class="text-muted mb-1">Level</p>
                    <h5 id="displayLevel">Beginner</h5>
                </div>
                <div class="col">
                    <p class="text-muted mb-1">Moves</p>
                    <h5 id="moveCount">0</h5>
                </div>
                <div class="col">
                    <p class="text-muted mb-1">Time</p>
                    <h5 id="timer">00:00</h5>
                </div>
                <div class="col">
                    <p class="text-muted mb-1">Matches</p>
                    <h5 id="matchCount">0 / 6</h5>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Board -->
    <div class="container">
        <div id="gameBoard" class="game-board"></div>
    </div>

    <!-- Buttons -->
    <div class="text-center my-4">
        <a href="setup.html" class="btn btn-primary me-2">New Game</a>
        <button onclick="resetGame()" class="btn btn-secondary">Restart</button>
    </div>

    <footer class="text-center py-3 bg-primary text-white">
        BrainMatch | Memory Game | SEG3125
    </footer>

    <script src="script.js"></script>
</body>
</html>
