<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - BrainMatch</title>

    <!-- Simple Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- My CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Simple Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="memory-game.html">BrainMatch</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="memory-game.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="setup.html">Play</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Space under navbar -->
    <div style="height: 70px;"></div>

    <!-- Setup Form -->
    <div class="container my-4">
        <div class="card p-4">
            <h2 class="text-center mb-3">Game Setup</h2>
            <p class="text-center text-muted mb-4">Choose your settings before starting.</p>

            <form action="game.html" method="GET">

                <!-- Level Selection -->
                <h5>Select Level</h5>
                <div class="row mb-4">

                    <div class="col-md-4 mb-3">
                        <label class="p-3 border rounded w-100 text-center">
                            <input type="radio" name="level" value="beginner" checked>
                            <div class="mt-2">Beginner<br><small>4x3 Grid</small></div>
                        </label>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="p-3 border rounded w-100 text-center">
                            <input type="radio" name="level" value="intermediate">
                            <div class="mt-2">Intermediate<br><small>4x4 Grid</small></div>
                        </label>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="p-3 border rounded w-100 text-center">
                            <input type="radio" name="level" value="advanced">
                            <div class="mt-2">Advanced<br><small>6x4 Grid</small></div>
                        </label>
                    </div>

                </div>

                <!-- Theme Selection -->
                <h5>Select Theme</h5>
                <div class="row mb-4">

                    <div class="col-md-4 mb-3">
                        <label class="p-3 border rounded w-100 text-center">
                            <input type="radio" name="theme" value="animals" checked>
                            <div class="mt-2">Animals</div>
                        </label>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="p-3 border rounded w-100 text-center">
                            <input type="radio" name="theme" value="nature">
                            <div class="mt-2">Nature</div>
                        </label>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="p-3 border rounded w-100 text-center">
                            <input type="radio" name="theme" value="food">
                            <div class="mt-2">Food</div>
                        </label>
                    </div>

                </div>

                <!-- Options -->
                <h5>Options</h5>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" name="timer" checked>
                    <label class="form-check-label">Show Timer</label>
                </div>

                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" name="sound">
                    <label class="form-check-label">Sound Effects</label>
                </div>

                <!-- Submit -->
                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">Start Game</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3">
        <p class="mb-0">BrainMatch | Memory Game | SEG3125</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
